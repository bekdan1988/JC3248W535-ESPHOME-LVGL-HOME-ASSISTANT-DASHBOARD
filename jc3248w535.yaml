      }
      bool c1 = id(living_room_ac_hvac_mode).state != "off" && id(living_room_ac_hvac_mode).state != "unavailable";
      bool c2 = id(first_floor_ac_hvac_mode).state != "off" && id(first_floor_ac_hvac_mode).state != "unavailable";
      if (c1 || c2) return {"on"};
      return {"off"};
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_air_conditioners
            text: !lambda |-
              auto label = id(lbl_air_conditioners);
              lv_obj_set_style_text_font(label, id(f_main_menu_icons).get_lv_font(), 0);
