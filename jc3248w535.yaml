              }
              return "${icon_air_conditioner}";

lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touch
  rotation: 270
  buffer_size: 60%
  color_depth: 16
  update_interval: never
  bg_color: 0x000000
  resume_on_input: false

  theme:
    label:
      text_font: f_small
      checked: &invert
        text_color: color_whitesmoke
        bg_color: lightgreen
        bg_opa: 70%
        radius: 14
        shadow_width: 8
        shadow_opa: 40%
    
    button:
      <<: &common_btn
        text_color: color_whitesmoke
        bg_color: darkgrey
        bg_opa: 65%
        radius: 14
        pad_all: 4
        shadow_width: 10
        shadow_opa: 45%
      pressed:
        bg_color: darkgrey
        bg_opa: 85%
        shadow_width: 4
        shadow_opa: 30%
      checked: *invert
    
    buttonmatrix:
      bg_opa: TRANSP
      border_color: 0x0077b3
      border_width: 0
      text_color: color_whitesmoke
      pad_all: 0
      items:
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: 90%
        radius: 12
        border_color: 0x0077b3
        border_width: 1
        text_color: color_whitesmoke
        pressed:
          bg_color: 0x006699
