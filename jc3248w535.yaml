                    shadow_color: color_gray20
                    shadow_width: 20
                    shadow_opa: COVER
                  on_release:
                    then:
                      - homeassistant.action:
                          action: climate.set_temperature
                          data:
                            temperature: !lambda return x / 2.0;
                            entity_id: climate.termosztat
              
