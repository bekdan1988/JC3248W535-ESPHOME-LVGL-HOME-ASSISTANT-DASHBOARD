                    bg_color: color_dark_blue
                    text_color: color_whitesmoke
                  options: ["${icon_heat} ${hvac_dropdown_heat}", "${icon_power} ${hvac_dropdown_off}", "${icon_thermostat_auto} ${hvac_dropdown_auto}"]
                  selected_index: 0
                  on_value:
                    - homeassistant.action:
                        action: climate.set_hvac_mode
                        data:
                          entity_id: climate.termosztat
                          hvac_mode: !lambda |-
                            if (x == 0) return "heat";
                            if (x == 1) return "off";
                            if (x == 2) return "auto";
                            return "heat";
    
