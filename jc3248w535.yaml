script:
  - id: script_restart
    then:
      - lvgl.page.show: page_restart_screen
      - delay: 3s
      - button.press: system_restart

  - id: script_shutdown
    then:
      - lvgl.page.show: page_shutdown_screen
      - delay: 3s
      - button.press: system_shutdown

  - id: script_cpu_save_mode
    mode: restart
    then:
      - lambda: |-
          rtc_cpu_freq_config_t cfg;
          rtc_clk_cpu_freq_mhz_to_config(80, &cfg);
          rtc_clk_cpu_freq_set_config(&cfg);          
          #if CONFIG_IDF_TARGET_ESP32S3
          esp_sleep_pd_config(ESP_PD_DOMAIN_XTAL, ESP_PD_OPTION_OFF);
          #endif

  - id: script_cpu_perf_mode
    mode: restart
    then:
      - lambda: |-
          #if CONFIG_IDF_TARGET_ESP32S3
          esp_sleep_pd_config(ESP_PD_DOMAIN_XTAL, ESP_PD_OPTION_ON);
          #endif          
          rtc_cpu_freq_config_t cfg;
          rtc_clk_cpu_freq_mhz_to_config(240, &cfg);
          rtc_clk_cpu_freq_set_config(&cfg);

  - id: delayed_wifi_off
    mode: restart
    then:
      - delay: 30s
      - wifi.disable:
  
  - id: script_delayed_sleep
    mode: restart
    then:
      - delay: !lambda "return id(timeout_value) * 1000;"
      - if:
          condition:
            lambda: 'return !id(is_camera_page_active);'
          then:
            - lvgl.page.show: page_home
            - delay: 200ms
            - lvgl.pause:
                show_snow: false
            - light.turn_off: display_backlight
            - script.execute: delayed_wifi_off
            - component.suspend: raw_battery_v
            - script.execute: script_cpu_save_mode
            - lambda: |-
                id(my_touch).set_update_interval(200);
      - delay: !lambda 'return atoi("${deep_sleep_seconds}") * 1000;'
      - if:
          condition:
            lambda: 'return !id(instant_wake_enabled);'
          then:
            - deep_sleep.enter:
                id: ds_control
                sleep_duration: !lambda |-
                  int total_awake_seconds = id(timeout_value) + atoi("${deep_sleep_seconds}");
                  int base_sleep_seconds = atoi("${deep_sleep_duration}"); 
                  int corrected_seconds = base_sleep_seconds - total_awake_seconds;
                  if (corrected_seconds < 1) { corrected_seconds = 1; } 
                  return corrected_seconds * 1000;

  - id: script_set_timeout
    parameters:
      value: int
    then:
      - globals.set:
          id: timeout_value
          value: !lambda "return value;"
      - number.set:
          id: display_timeout
          value: !lambda "return value;"
      - lambda: |-
          auto update_btn = [&](lv_obj_t* btn, int btn_val) {
            if (value == btn_val) {
              lv_obj_add_state(btn, (lv_state_t)(LV_STATE_CHECKED | LV_STATE_DISABLED));
            } else {
              lv_obj_clear_state(btn, (lv_state_t)(LV_STATE_CHECKED | LV_STATE_DISABLED));
            }
          };
          update_btn(id(btn_timeout_60), 60);
          update_btn(id(btn_timeout_120), 120);
          update_btn(id(btn_timeout_180), 180);
      - script.execute: script_delayed_sleep

  - id: show_and_hide_tray
    mode: restart
    then:
      - lvgl.widget.show: obj_tray
      - delay: "${hide_tray_timeout}"
      - lvgl.widget.hide: obj_tray

  - id: line_burn_in_protection
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - lvgl.widget.update:
                id: line_top
                opa: 60%
            - lvgl.widget.update:
                id: line_bottom
                opa: 60%
            - delay: 15sec
            - lvgl.widget.update:
                id: line_top
                opa: 55%
            - lvgl.widget.update:
                id: line_bottom
                opa: 55%
            - delay: 15sec
            - lvgl.widget.update:
                id: line_top
                opa: 60%
            - lvgl.widget.update:
                id: line_bottom
                opa: 60%
            - delay: 15sec
            - lvgl.widget.update:
                id: line_top
                opa: 65%
            - lvgl.widget.update:
                id: line_bottom
                opa: 65%
            - delay: 15sec
  
esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  min_version: 2026.4.0
  platformio_options:
    build_flags: "-w -include soc/rtc.h -include esp_private/rtc_clk.h"
  on_boot:
    priority: -100
    then:
      - light.control:
          id: display_backlight
          brightness: !lambda "return id(saved_brightness) / 100.0;"
      - lvgl.slider.update:
          id: brightness_slider
          value: !lambda "return id(saved_brightness);"
      - number.set:
          id: display_timeout
          value: !lambda 'return id(timeout_value);'
      - script.execute:
          id: script_set_timeout
          value: !lambda 'return id(timeout_value);'
      - script.execute: line_burn_in_protection
      - if:
          condition:
            lambda: 'return id(scheduled_deep_sleep_enabled);'
          then:
            - lambda: |-
                #if CONFIG_IDF_TARGET_ESP32S3
                esp_sleep_wakeup_cause_t wakeup_reason = esp_sleep_get_wakeup_cause();
                bool is_auto_timer_wakeup = (wakeup_reason == ESP_SLEEP_WAKEUP_TIMER);
                #else
                bool is_auto_timer_wakeup = true; 
                #endif
                auto time_now = id(sntp_time).now();
                if (time_now.is_valid()) {
                    int current_hour = time_now.hour;
                    int stop_hour = atoi("${night_deep_sleep_stop}");
                    int start_hour = atoi("${night_deep_sleep_start}");
                    if (is_auto_timer_wakeup && (current_hour >= stop_hour && current_hour < start_hour) && id(instant_wake_switched_by_auto)) {
                        id(instant_wake_enabled) = true;
                        id(instant_wake_switched_by_auto) = false;
                    }
                    else if (current_hour >= start_hour || current_hour < stop_hour) {
                        id(instant_wake_enabled) = false;
                        id(instant_wake_switched_by_auto) = true;
                    }
                }
      - if:
          condition:
            lambda: 'return id(instant_wake_enabled);'
          then:
            - switch.turn_on: instant_wake_switch
          else:
            - switch.turn_off: instant_wake_switch
      - delay: 1s
      - script.execute: script_delayed_sleep

esp32: 
  board: esp32-s3-devkitc-1
  framework: 
    type: esp-idf
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_PERF: y
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: y
      CONFIG_ESPTOOLPY_FLASHMODE_OPI: y
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: y
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "1000"
      CONFIG_ESP32_BROWNOUT_DET_LVL: "0"
      CONFIG_LV_ATTRIBUTE_FAST_MEM: n
      CONFIG_LV_ATTRIBUTE_MEM_ALIGN: "4"
      CONFIG_LV_DRAW_BUF_ALIGN: "64"
      CONFIG_LV_USE_DRAW_ARM2D_SYNC: n
      CONFIG_LV_USE_GPU_ARM2D: n
      CONFIG_LV_USE_MATH_FAST: y
      CONFIG_LV_USE_PERF_MONITOR: n
      CONFIG_LV_MEM_CUSTOM: y
      CONFIG_LV_MEM_ADR: "0x0"
      CONFIG_LV_VDB_SIZE: "60"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "32768"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_SPIRAM_SPEED_120M: y
      CONFIG_SPIRAM_TRY_ALLOCATE_FIRST_FROM_INTERNAL: y
  flash_size: 16MB

logger:
  baud_rate: 0
  level: "${logger_level}"
  logs:
    http_request: "${logger_http_request}"
  tx_buffer_size: 160
  hardware_uart: USB_SERIAL_JTAG
  
psram:
  mode: octal
  speed: 80MHz

spi: 
  id: display_qspi
  type: quad
  clk_pin: 47
  data_pins: [21,48,40,39]

i2c:
  id: touchscreen_bus
  sda: 4
  scl: 8
  frequency: 400kHz

display:
  - platform: mipi_spi
    id: my_display
    setup_priority: -100
    model: jc3248w535
    data_rate: 40MHz
    auto_clear_enabled: false
    update_interval: never

output:
  - platform: ledc
    pin: GPIO1
    id: backlight

light:
  - platform: monochromatic
    output: backlight
    id: display_backlight
    gamma_correct: 1.0
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: axs15231
    id: my_touch
    update_interval: 30ms
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - lambda: |-
                  id(my_touch).set_update_interval(30);
              - script.execute: script_cpu_perf_mode
              - script.stop: delayed_wifi_off
              - component.resume: raw_battery_v
              - wifi.enable:
              - lvgl.resume:
              - light.turn_on: display_backlight
              - delay: 200ms
              - if:
                  condition:
                    not:
                      wifi.connected:
                  then:
                    - lvgl.page.show: page_no_wifi_connection
              - if:
                  condition:
                    and:
                      - wifi.connected:
                      - not:
                          api.connected:
                  then:
                    - lvgl.page.show: page_no_api_connection
              - script.execute: script_delayed_sleep
    on_touch:
      then:
        - script.execute: script_delayed_sleep
        - if:
            condition:
              lambda: 'return id(is_camera_page_active);'
            then:
              - script.execute: show_and_hide_tray

deep_sleep:
  id: ds_control
  sleep_duration: "${deep_sleep_duration}s"

api:
  encryption:
    key: "${api_encription_key}"
  reboot_timeout: "${reboot_timeout}"
  on_client_connected:
    - delay: 500ms
    - if:
        condition:
          and:
            - wifi.connected:
            - api.connected:
            - not:
                lvgl.is_paused:
        then:
          - lvgl.widget.show: lbl_hastatus
          - lvgl.page.show: page_home
  on_client_disconnected:
    - delay: 2s
    - if:
        condition:
          and:
            - wifi.connected:
            - not:
                api.connected:
            - not:
                lvgl.is_paused:
        then:
          - lvgl.widget.hide: lbl_hastatus
          - lvgl.page.show: page_no_api_connection

ota:
  - platform: esphome
    password: "${ota_password}"

network:
    enable_high_performance: true

wifi:
  fast_connect: true
  power_save_mode: none
  reboot_timeout: "${reboot_timeout}"
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"
  use_psram: True
  on_connect:
    then:
      - delay: 500ms
      - lvgl.widget.show: lbl_wifi_icon
      - if:
          condition:
            and:
              - api.connected:
              - not:
                  lvgl.is_paused:
          then:
            - lvgl.page.show: page_home
  on_disconnect:
    then:
      - lvgl.widget.hide: lbl_wifi_icon
      - delay: 2s
      - if:
          condition:
            not:
              lvgl.is_paused:
          then:
            - lvgl.page.show: page_no_wifi_connection

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_clock
            text: !lambda return id(sntp_time).now().strftime("${clock_time_format}");
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_clock
              text: !lambda return id(sntp_time).now().strftime("${clock_time_format}");
          - if:
              condition:
                lambda: |-
                  if (!id(scheduled_deep_sleep_enabled)) return false;
                  auto time_now = id(sntp_time).now();
                  if (time_now.is_valid()) {
                      int h = time_now.hour;
                      int start_hour = atoi("${night_deep_sleep_start}");
                      int stop_hour = atoi("${night_deep_sleep_stop}");
                      if ((h >= start_hour || h < stop_hour) && id(instant_wake_enabled)) {
                          return true;
                      }
                  }
                  return false;
              then:
                - globals.set: { id: instant_wake_switched_by_auto, value: 'true' }
                - switch.turn_off: instant_wake_switch

number:
  - platform: template
    name: "${display_timeout}"
    id: display_timeout
    icon: mdi:timer
    optimistic: True
    min_value: 60
    max_value: 180
    step: 60
    initial_value: 60
    unit_of_measurement: "s"
    set_action:
      - if:
          condition:
            lambda: 'return !id(is_camera_page_active);'
          then:
            - globals.set:
                id: timeout_value
                value: !lambda return x;
            - script.execute:
                id: script_set_timeout
                value: !lambda return x;

button:
  - platform: shutdown
    id: system_shutdown
    name: "${system_shutdown}"
  
  - platform: restart
    id: system_restart
    name: "${system_restart}"   

image:
  - file: "${boot_logo}"
    id: boot_logo
    type: RGB565
    transparency: alpha_channel

http_request:
  useragent: esphome/device
  
online_image:
  - id: online_image_camera
    url: "http://placeholder.local"
    format: JPG
    type: RGB565
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: widget_camera
          src: online_image_camera

globals:
  - id: timeout_value
    type: int
    restore_value: yes
    initial_value: '60'
  
  - id: saved_brightness
    type: int
    restore_value: yes
    initial_value: '50'
  
  - id: is_camera_page_active
    type: bool
    initial_value: 'false'

  - id: instant_wake_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: scheduled_deep_sleep_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: instant_wake_switched_by_auto
    type: bool
    restore_value: yes
    initial_value: 'false'

interval:
  - interval: "${camera_update_interval}"
    then:
      - if:
          condition:
            lambda: 'return id(is_camera_page_active);'
          then:
            - lambda: |-
                id(online_image_camera).set_url(id(camera_image_url).state.c_str());
                id(online_image_camera).update();
  
  - interval: 10min
    then:
      - if:
          condition:
            lambda: 'return id(is_camera_page_active);'
          then:
            - lvgl.pause: 
                show_snow: true
            - delay: 15s
            - lvgl.resume:

switch:
  - platform: template
    name: "${scheduled_deep_sleep}"
    id: scheduled_deep_sleep_switch
    icon: mdi:clock-start
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - globals.set: { id: scheduled_deep_sleep_enabled, value: 'true' }
        - lambda: |-
            if (id(scheduled_deep_sleep_sw_widget) != nullptr) {
              lv_obj_add_state(id(scheduled_deep_sleep_sw_widget), LV_STATE_CHECKED);
            }
    on_turn_off:
      then:
        - globals.set: { id: scheduled_deep_sleep_enabled, value: 'false' }
        - lambda: |-
            if (id(scheduled_deep_sleep_sw_widget) != nullptr) {
              lv_obj_clear_state(id(scheduled_deep_sleep_sw_widget), LV_STATE_CHECKED);
            }
        - if:
            condition:
              lambda: 'return !id(instant_wake_enabled);'
            then:
              - switch.turn_on: instant_wake_switch
  
  - platform: template
    name: "${instant_wake}"
    id: instant_wake_switch
    icon: mdi:power-sleep
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        - globals.set: { id: instant_wake_enabled, value: 'true' }
        - globals.set: { id: instant_wake_switched_by_auto, value: 'false' }
        - lambda: |-
            if (id(instant_wake_sw_widget) != nullptr) {
              lv_obj_add_state(id(instant_wake_sw_widget), LV_STATE_CHECKED);
            }       
    on_turn_off:
      then:
        - globals.set: { id: instant_wake_enabled, value: 'false' }
        - script.execute: script_delayed_sleep
        - lambda: |-
            if (id(instant_wake_sw_widget) != nullptr) {
              lv_obj_clear_state(id(instant_wake_sw_widget), LV_STATE_CHECKED);
            }
        - if:
            condition:
              lambda: 'return !id(scheduled_deep_sleep_enabled);'
            then:
              - switch.turn_on: scheduled_deep_sleep_switch

  - platform: homeassistant
    id: kids_room_socket_auto_turn_off
    entity_id: automation.gyerekszoba_konnektor_automatikus_kikapcsolasa
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_kids_room_socket_auto_turn_off
            state:
              checked: !lambda "return x;"
  
  - platform: homeassistant
    id: dehumidifier_auto_turn_off
    entity_id: automation.paramentesito_automatikus_kikapcsolasa
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_dehumidifier_auto_turn_off
            state:
              checked: !lambda "return x;"
  
  - platform: homeassistant
    id: couch_socket_auto_turn_off
    entity_id: automation.kanape_konnektor_kikapcsolasa_toltes_befejezesekor
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_couch_socket_auto_turn_off
            state:
              checked: !lambda "return x;"

sensor:
  - platform: uptime
    id: uptime_seconds
    internal: true

  - platform: template
    name: "${uptime}"
    lambda: |-
      return (id(uptime_seconds).state / 3600.0); 
    icon: mdi:clock-outline
    unit_of_measurement: "${uptime_days_unit_of_measurement}"
    update_interval: 60s

  - platform: wifi_signal
    id: my_wifi_signal
    name: "${wifi_signal}"
    update_interval: 30s
    unit_of_measurement: "%"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_wifi_icon
            text: !lambda |-
              if (x > -50) return "${icon_wifi_strong}"; // Strong
              if (x > -70) return "${icon_wifi_medium}"; // Medium
              return "${icon_wifi_weak}";                // Weak

  - platform: adc
    pin: 5
    id: raw_battery_v
    update_interval: 1s
    attenuation: 12db
    accuracy_decimals: 2
    internal: true
    filters:
      - multiply: 1.72         
    on_value:
      - lvgl.label.update:
          id: batt_label
          text_font: f_tray_icons  
          text_color: !lambda |-
            bool is_charging = id(battery_charging_sensor).state;
            float filt_v = id(filtered_battery_v).state;
            if (is_charging) {
                if (filt_v >= 4.20f) return id(color_screamin_green);
                return id(color_whitesmoke);
            }   
            float current_soc = id(battery_soc_sensor).state;
            if (!std::isnan(current_soc) && current_soc <= 20.0f) {
                return id(color_red);
            }
            return id(color_whitesmoke);
          text: !lambda |-
            static char buf[10];             
            if (millis() < 10000) {
                snprintf(buf, sizeof(buf), "%s", "${icon_battery_unknown}");
                return buf;
            }            
            static bool charge_lock = false;
            bool charging_active = id(battery_charging_sensor).state;
            float current_v = id(filtered_battery_v).state;
            if (charging_active) {
                charge_lock = true;
            }
            if (current_v < 4.00f) {
                charge_lock = false;
            }
            if (charging_active || charge_lock) {
                snprintf(buf, sizeof(buf), "%s", "${icon_power_plug_battery}");
                return buf;
            }
            float soc_val = id(battery_soc_sensor).state;
            if (std::isnan(soc_val)) {
                snprintf(buf, sizeof(buf), "%s", "${icon_battery_unknown}");
                return buf;
            }            
            int soc = (int)std::lround(soc_val);
            std::string icon;            
            if (soc >= 100)     icon = "${icon_battery_full}";
            else if (soc >= 90) icon = "${icon_battery_90}";
            else if (soc >= 80) icon = "${icon_battery_80}";
            else if (soc >= 70) icon = "${icon_battery_70}";
            else if (soc >= 60) icon = "${icon_battery_60}";
            else if (soc >= 50) icon = "${icon_battery_50}";
            else if (soc >= 40) icon = "${icon_battery_40}";
            else if (soc >= 30) icon = "${icon_battery_30}";
            else if (soc >= 20) icon = "${icon_battery_20}";
            else if (soc >= 10) icon = "${icon_battery_10}";
            else                icon = "${icon_battery_outline}";
            snprintf(buf, sizeof(buf), "%s", icon.c_str());
            return buf;

  - platform: template
    id: filtered_battery_v
    update_interval: 1s
    internal: true
    filters:
      - sliding_window_moving_average:
          window_size: 30
          send_every: 1
    lambda: |-
      return id(raw_battery_v).state;

  - platform: template
    name: "${battery}"
    id: battery_soc_sensor
    device_class: "battery"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (millis() < 10000) return {}; 
      float filt = id(filtered_battery_v).state;
      if (id(battery_charging_sensor).state) {
          return 100.0f; 
      }
      float soc_ha = 0.0f;
      if (filt <= 3.00f) soc_ha = 0.0f;
      else if (filt <= 3.36f) soc_ha = 0.0f  + (filt - 3.00f) * (5.0f - 0.0f) / (3.36f - 3.36f);
      else if (filt <= 3.41f) soc_ha = 5.0f  + (filt - 3.36f) * (10.0f - 5.0f) / (3.41f - 3.36f);
      else if (filt <= 3.48f) soc_ha = 10.0f + (filt - 3.41f) * (20.0f - 10.0f) / (3.48f - 3.41f);
      else if (filt <= 3.52f) soc_ha = 20.0f + (filt - 3.48f) * (30.0f - 20.0f) / (3.52f - 3.48f);
      else if (filt <= 3.56f) soc_ha = 30.0f + (filt - 3.52f) * (40.0f - 30.0f) / (3.56f - 3.52f);
      else if (filt <= 3.61f) soc_ha = 40.0f + (filt - 3.56f) * (50.0f - 40.0f) / (3.61f - 3.56f);
      else if (filt <= 3.70f) soc_ha = 50.0f + (filt - 3.61f) * (60.0f - 50.0f) / (3.70f - 3.61f);
      else if (filt <= 3.79f) soc_ha = 60.0f + (filt - 3.70f) * (70.0f - 60.0f) / (3.79f - 3.70f);
      else if (filt <= 3.89f) soc_ha = 70.0f + (filt - 3.79f) * (80.0f - 70.0f) / (3.89f - 3.79f);
      else if (filt <= 3.98f) soc_ha = 80.0f + (filt - 3.89f) * (90.0f - 80.0f) / (3.98f - 3.89f);
      else if (filt <= 4.02f) soc_ha = 90.0f + (filt - 3.98f) * (100.0f - 90.0f) / (4.02f - 3.98f);
      else soc_ha = 100.0f;
      if (soc_ha > 100.0f) return 100.0f;
      if (soc_ha < 0.0f) return 0.0f;
