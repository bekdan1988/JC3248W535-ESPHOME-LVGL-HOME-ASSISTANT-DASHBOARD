substitutions:
  # SECRETS
  api_encription_key: !secret jc3248w535_api_encryption_key
  ota_password: !secret jc3248w535_ota_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  home_assistant_url: !secret ha_url                                  # e.g.: http://192.168.0.200:8123

  # DEVICE SETTINGS
  name: "jc3248w535"                                                  # Device's internal name. E.g. on network
  friendly_name: "JC3248W535"                                         # Device's name in Home Assistant
  logger_level: "ERROR"                                               # Check log levels: https://esphome.io/components/logger/#log-levels
  logger_http_request: "ERROR"                                        # Check log levels: https://esphome.io/components/logger/#log-levels
  reboot_timeout: "0s"                                                # Wi-Fi and API reboot timeout if not connected (0s - disabled)
  deep_sleep_seconds: "60"                                            # Seconds the device goes into deep sleep after display timeout
  deep_sleep_duration: "3600"                                         # Deep sleep duration in seconds (60 min)
  night_deep_sleep_start: "20"                                        # Night deep sleep start hour
  night_deep_sleep_stop: "6"                                          # Night deep sleep stop hour
  
  # LVGL SETTINGS
  timezone: "Europe/Budapest"                                         # Check: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  clock_time_format: "%m. %d. %H:%M"                                  # EN: "%d. %m. %H:%M"
