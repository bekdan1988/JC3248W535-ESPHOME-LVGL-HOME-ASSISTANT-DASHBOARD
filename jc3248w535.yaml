binary_sensor:
  - platform: template
    name: "${battery_charging}"
    id: battery_charging_sensor
    device_class: "battery_charging"
    lambda: |-
      if (millis() < 10000) return {}; 
      float raw = id(raw_battery_v).state;
      float filt = id(filtered_battery_v).state;
      static bool ha_charging_state = false;
      static int ha_on_b = 0; static int ha_off_b = 0;
      if (raw > (filt + 0.08f) || raw > 4.15f) { ha_on_b++; ha_off_b = 0; }
      else if (raw < (filt - 0.02f) && raw < 4.05f) { ha_off_b++; ha_on_b = 0; }
      else { ha_on_b = 0; ha_off_b = 0; }
      if (ha_on_b >= 12) ha_charging_state = true;
      if (ha_off_b >= 10) ha_charging_state = false;
      return ha_charging_state;

  - platform: template
    name: "${battery_fully_charged}"
    id: battery_fully_charged_sensor
    icon: "mdi:battery-check"
    lambda: |-
      if (millis() < 10000) return {};
      float filt_v = id(filtered_battery_v).state;
      bool is_charging = id(battery_charging_sensor).state;
      if (is_charging && filt_v >= 4.20f) {
          return true;
      }
      return false;

