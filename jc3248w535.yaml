    - id: page_pwm
      on_load:
        then:
          - lvgl.label.update:
              id: lbl_header
              text: "${icon_pwm} ${page_name_pwm}"
          - lambda: |-
              if (id(instant_wake_enabled)) {
                lv_obj_add_state(id(instant_wake_sw_widget), LV_STATE_CHECKED);
              } else {
                lv_obj_clear_state(id(instant_wake_sw_widget), LV_STATE_CHECKED);
              }
      bg_color: color_pickled_bluewood
      widgets:
        - obj:
            scrollable: false
            scrollbar_mode: "OFF"
            styles: style_main_object
            layout:
              type: flex
              flex_flow: row_wrap
              flex_align_main: space_evenly
              flex_align_cross: space_evenly
              flex_align_track: space_evenly
            widgets:       
              - button:
                  id: btn_timeout_60
                  press_lock: false
                  styles: style_icon_btn
                  checkable: true
                  widgets:
                      - label:
                          align: CENTER
                          text_font: f_medium
                          styles: style_label_icon_56
                          text: "${icon_timer} ${timeout_60}\n${icon_power_sleep} ${ds_2}"
                  on_click:
                    then:
                      - script.execute:
                          id: script_set_timeout
                          value: 60
              
              - button:
                  id: btn_timeout_120
                  press_lock: false
                  styles: style_icon_btn
                  checkable: true
                  widgets:
                      - label:
                          align: CENTER
                          text_font: f_medium
                          styles: style_label_icon_56
                          text: "${icon_timer} ${timeout_120}\n${icon_power_sleep} ${ds_3}"
                  on_click:
                    then:
                      - script.execute:
                          id: script_set_timeout
                          value: 120
              
              - button:
                  id: btn_timeout_180
                  press_lock: false
                  styles: style_icon_btn
                  checkable: true
                  widgets:
                      - label:
                          align: CENTER
                          text_font: f_medium
                          styles: style_label_icon_56
                          text: "${icon_timer} ${timeout_180}\n${icon_power_sleep} ${ds_4}"
                  on_click:
                    then:
                      - script.execute:
                          id: script_set_timeout
                          value: 180
              
              - button:
                  id: btn_pwm_back
                  press_lock: false
                  styles: style_icon_btn
                  widgets:
                      - label:
                          align: CENTER
                          styles: style_label_icon_56
                          text: "${icon_arrow_left}"
                  on_click:
                    then:
                      lvgl.page.show: page_settings
              
              - label:
                  id: lbl_brightness
                  text_font: f_medium
                  text_color: color_whitesmoke
                  text: "${icon_brightness} ${display_brightness}"
              
              - slider:
                  id: brightness_slider
                  min_value: 1
                  max_value: 100
                  height: 20
                  bg_color: color_gray20
                  bg_opa: COVER
                  indicator:
                    bg_color: color_sapphire
                    checked:
                      bg_color: color_sapphire
                      bg_opa: COVER
                  focused:
                    outline_width: 0
                  knob:
                    bg_color: color_deep_sky_blue
                    bg_opa: COVER
                    shadow_color: color_gray20
                    shadow_width: 20
                    shadow_opa: COVER
                  on_value:
                    then:
                      - light.control:
                          id: display_backlight
                          brightness: !lambda "return x / 100.0;"
                      - globals.set:
                          id: saved_brightness
                          value: !lambda "return x;"
              - label:
                  id: lbl_instant_wake
                  text_font: f_medium
                  text_color: color_whitesmoke
                  text: "${icon_power_sleep} ${instant_wake}"

              - switch:
                  id: instant_wake_sw_widget
                  bg_color: color_gray20
                  bg_grad_dir: NONE
                  bg_opa: COVER
                  indicator:
                    bg_color: color_sapphire
                    checked:
                      bg_color: color_sapphire
                      bg_opa: COVER
                  focused:
                    outline_width: 0
                  knob:
                    bg_color: color_dark_gray
                    checked:
                      bg_color: color_deep_sky_blue
                    shadow_color: color_gray20
                    shadow_width: 20
                    shadow_opa: COVER
                  on_change:
                    - if:
                        condition:
                          lambda: 'return x;'
                        then:
                          - switch.turn_on: instant_wake_switch
                        else:
                          - switch.turn_off: instant_wake_switch

              - label:
                  id: lbl_scheduled_deep_sleep
                  text_font: f_medium
                  text_color: color_whitesmoke
                  text: "${icon_clock_start} ${scheduled_deep_sleep}"

              - switch:
                  id: scheduled_deep_sleep_sw_widget
                  bg_color: color_gray20
                  bg_grad_dir: NONE
                  bg_opa: COVER
                  indicator:
                    bg_color: color_sapphire
                    checked:
                      bg_color: color_sapphire
                      bg_opa: COVER
                  focused:
                    outline_width: 0
                  knob:
                    bg_color: color_dark_gray
                    checked:
                      bg_color: color_deep_sky_blue
                    shadow_color: color_gray20
                    shadow_width: 20
                    shadow_opa: COVER
                  on_change:
                    - if:
                        condition:
                          lambda: 'return x;'
                        then:
                          - switch.turn_on: scheduled_deep_sleep_switch
                        else:
                          - switch.turn_off: scheduled_deep_sleep_switch
    
