                  id: thermostat_target_temp_arc
                  align: CENTER
                  width: 240
                  height: 240
                  min_value: 14
                  max_value: 70
                  value: 40
                  adjustable: true
                  change_rate: 360
                  bg_opa: TRANSP
                  arc_opa: TRANSP
                  arc_color: !lambda 'return id(color_dark_gray);'
                  indicator:
                    bg_opa: TRANSP
                    arc_opa: TRANSP
