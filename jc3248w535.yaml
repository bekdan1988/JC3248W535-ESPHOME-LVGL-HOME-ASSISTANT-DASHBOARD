  camera_update_interval: "3s"                                        # The update interval of the camera image in seconds
  hide_tray_timeout: "10s"                                            # Hide tray timeout
  img_camera_resolution: "&width=480&height=270"                      # The resolution of the downloaded camera image
  temperature_unit_of_measurement: "°C"                               # or "°F"
  not_available: "---"                                                # The value of unavailable entity
  
